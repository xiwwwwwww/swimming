name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Fix permissions
        run: chmod +x dockerfiles/start.sh

      - name: Build Docker image
        run: docker build --tag=swimpool-android --file=dockerfiles/Dockerfile .

      - name: Build APK in container
        id: build
        run: |
          docker run --name swimpool-build --env-file dockerfiles/env.list \
                     swimpool-android "buildozer android debug" 2>&1 | tee buildozer.log
        timeout-minutes: 120
        continue-on-error: true

      - name: Extract APK from container
        if: always()
        run: |
          mkdir -p bin
          docker cp swimpool-build:/home/user/bin/. ./bin/ 2>/dev/null || true
          echo "=== Files in bin/ ==="
          ls -la bin/ || echo "bin/ is empty"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swimpool-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            buildozer.log
          retention-days: 7