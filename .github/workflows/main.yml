name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean
        run: |
          rm -rf .buildozer
          rm -rf bin
          sudo apt clean

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip python3-dev build-essential autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev gettext autopoint cython3
          sudo ln -sf /usr/bin/cython3 /usr/bin/cython 2>/dev/null || true
          pip install --upgrade pip
          pip install cmake cython buildozer

      - name: Build APK
        timeout-minutes: 120
        run: |
          export PIP_BREAK_SYSTEM_PACKAGES=1
          export ANDROID_SDK_ACCEPT_LICENSE=y
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Show log on failure
        if: failure()
        run: tail -200 buildozer.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swimpool-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: buildozer.log
          retention-days: 7