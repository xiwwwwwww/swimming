name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Fix permissions
        run: chmod +x dockerfiles/start.sh

      - name: Build Docker image
        run: docker build --tag=swimpool-android --file=dockerfiles/Dockerfile .

      - name: Build APK
        id: build
        run: |
          docker run --name swimpool-build --env-file dockerfiles/env.list \
                     swimpool-android /bin/sh -c "buildozer android debug 2>&1 | tee buildozer.log"
        timeout-minutes: 120
        continue-on-error: true

      - name: Copy APK from container
        run: |
          mkdir -p bin
          docker cp swimpool-build:/home/user/bin/. ./bin/ 2>/dev/null || true
          ls -la bin/

      - name: Copy build log from container
        if: always()
        run: |
          docker cp swimpool-build:/home/user/buildozer.log ./buildozer.log 2>/dev/null || true
          docker logs swimpool-build > docker-output.log 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swimpool-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            buildozer.log
            docker-output.log
          retention-days: 7